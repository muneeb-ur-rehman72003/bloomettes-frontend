<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Bootstrap CSS -->
    <link href="css/animate.css" rel="stylesheet" />
    <link href="fontawesome5/css/all.min.css" rel="stylesheet" />
    <link href="slick/slick-theme.css" rel="stylesheet" type="text/css" />
    <link href="slick/slick.css" rel="stylesheet" type="text/css" />
    <link href="css/slicknav.css" rel="stylesheet" type="text/css" />
    <link href="css/fancybox.css" rel="stylesheet" type="text/css" />
    <link href="css/bootstrap.css" rel="stylesheet" />
    <link href="css/custom.css" rel="stylesheet" />
    <link href="css/wp-custom.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
    />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <title>Cart | Bloomettes</title>
  </head>

  <body>
    <!-- Header Starts -->

    <div id="Header"></div>

    <!-- Header Ends -->

    <!-- Banner Starts -->

    <section class="banner-sec inner-banner-sec">
      <div class="container">
        <div class="row">
          <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 col-12">
            <div class="banner-txt-card-box">
              <div class="banner-box">
                <div class="banner-txt-main">
                  <div class="banner-heading">
                    <div class="banner-txt-ex">
                      <img src="images/pen2.png" alt="img" />
                    </div>

                    <h1>Cart</h1>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Banner Ends -->

    <!-- Cart Page Start -->
    <section class="shopping_cart inner-bg">
      <div class="container">
        <div class="row">
          <!-- LEFT: Cart table -->
          <div class="col-lg-8 col-md-7 col-sm-12 col-12">
            <div class="shopping_cart_table">
              <div class="table-responsive">
                <table class="cart-table w-100">
                  <thead>
                    <tr>
                      <th class="w-40">Product</th>
                      <th>Material</th>
                      <th>Quantity</th>
                      <th>Subtotal</th>
                      <th></th>
                    </tr>
                  </thead>

                  <tbody>
                    <!-- Row 1 -->
                    <tr>
                      <td>
                        <div class="cart_box_product">
                          <div class="cart_product_img">
                            <img src="images/product1.jpg" alt="Product" />
                          </div>
                          <div class="cart_product_name">
                            <h5>PRODUCT NAME</h5>
                          </div>
                        </div>
                      </td>

                      <td>
                        <h6 class="material">Lorem Ipsum</h6>
                      </td>

                      <td>
                        <div class="qty">
                          <button
                            class="qty-btn minus"
                            type="button"
                            aria-label="decrease"
                          >
                            −
                          </button>
                          <input
                            class="qty-input"
                            type="text"
                            value="1"
                            inputmode="numeric"
                            readonly
                          />
                          <button
                            class="qty-btn plus"
                            type="button"
                            aria-label="increase"
                          >
                            +
                          </button>
                        </div>
                      </td>

                      <td><p class="t_price">$40.00</p></td>
                      <td>
                        <button class="remove" aria-label="Remove item">
                          <i class="fas fa-times"></i>
                        </button>
                      </td>
                    </tr>

                    <!-- Row 2 -->
                    <tr>
                      <td>
                        <div class="cart_box_product">
                          <div class="cart_product_img">
                            <img src="images/product1.jpg" alt="Product" />
                          </div>
                          <div class="cart_product_name">
                            <h5>PRODUCT NAME</h5>
                          </div>
                        </div>
                      </td>

                      <td>
                        <h6 class="material">Lorem Ipsum</h6>
                      </td>

                      <td>
                        <div class="qty">
                          <button
                            class="qty-btn minus"
                            type="button"
                            aria-label="decrease"
                          >
                            −
                          </button>
                          <input
                            class="qty-input"
                            type="text"
                            value="1"
                            inputmode="numeric"
                            readonly
                          />
                          <button
                            class="qty-btn plus"
                            type="button"
                            aria-label="increase"
                          >
                            +
                          </button>
                        </div>
                      </td>

                      <td><p class="t_price">$40.00</p></td>
                      <td>
                        <button class="remove" aria-label="Remove item">
                          <i class="fas fa-times"></i>
                        </button>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>

              <div class="cart_actions">
                <button class="btn ghost">Clear Cart</button>
                <button class="btn muted">Update Cart</button>
              </div>
            </div>
          </div>

          <!-- RIGHT: Cart total / shipping -->
          <div class="col-lg-4 col-md-5 col-sm-12 col-12">
            <aside class="cart-summary">
              <h3>Cart Total</h3>

              <ul class="summary-list">
                <li><span>Subtotal</span><strong>$100.00</strong></li>
              </ul>

              <div class="shipping">
                <p class="label">Shipping</p>
                <label class="chk"
                  ><input type="checkbox" /> Free Shipping</label
                >
                <label class="chk"
                  ><input type="checkbox" /> Local Pickup</label
                >
                <label class="chk"
                  ><input type="checkbox" /> Flat rate: $5.00</label
                >
                <p class="hint">Shipping to CA.</p>
              </div>

              <div class="address">
                <div class="select-wrap">
                  <select>
                    <option>United States (US)</option>
                    <option>Canada</option>
                  </select>
                  <span class="chev">▾</span>
                </div>

                <div class="select-wrap">
                  <select>
                    <option>California</option>
                    <option>New York</option>
                  </select>
                  <span class="chev">▾</span>
                </div>

                <input type="text" placeholder="Town/City" />
                <input type="text" placeholder="Zip" />

                <button class="btn outline small">Update Totals</button>
              </div>

              <ul class="summary-list total">
                <li><span>Total</span><strong>$100.00</strong></li>
              </ul>

              <div class="cart-btn">
                <a href="checkout.html" class="theme1">
                  <span class="theme1-txt">CHECKOUT</span>
                </a>
              </div>
            </aside>
          </div>
        </div>
      </div>
    </section>
    <!-- Cart Page End -->

    <!-- Footer Starts -->

    <div id="Footer"></div>

    <!-- Footer Ends -->

    <script src="js/jquery-3.6.0.min.js"></script>
    <script src="js/wow.js"></script>
    <script src="slick/slick.js"></script>
    <script src="slick/slick.min.js"></script>
    <script src="js/jquery.slicknav.js"></script>
    <script src="js/fancybox.js"></script>
    <script src="js/bootstrap.js"></script>
    <script src="js/custom.js"></script>
    <script src="fontawesome5/font-awesomejs/font.js"></script>
    <script src="js/gsap-animation.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init();
    </script>
    <script>
      document.addEventListener("click", (e) => {
        if (!e.target.classList.contains("qty-btn")) return;
        const wrap = e.target.closest(".qty");
        const input = wrap.querySelector(".qty-input");
        let val = parseInt(input.value || "0", 10);
        if (e.target.classList.contains("plus")) val++;
        if (e.target.classList.contains("minus")) val = Math.max(0, val - 1);
        input.value = String(val);
      });
    </script>
  </body>
</html>
