<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Bootstrap CSS -->
    <link href="css/animate.css" rel="stylesheet" />
    <link href="fontawesome5/css/all.min.css" rel="stylesheet" />
    <link href="slick/slick-theme.css" rel="stylesheet" type="text/css" />
    <link href="slick/slick.css" rel="stylesheet" type="text/css" />
    <link href="css/slicknav.css" rel="stylesheet" type="text/css" />
    <link href="css/fancybox.css" rel="stylesheet" type="text/css" />
    <link href="css/bootstrap.css" rel="stylesheet" />
    <link href="css/custom.css" rel="stylesheet" />
    <link href="css/wp-custom.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"/>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <title>Account | Bloomettes</title>
  </head>

  <body>
    <!-- Header Starts -->

    <div id="Header"></div>

    <!-- Header Ends -->

    <!-- Banner Starts -->

    <section class="banner-sec inner-banner-sec">
      <div class="container">
        <div class="row">
          <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 col-12">
            <div class="banner-txt-card-box">
              <div class="banner-box">
                <div class="banner-txt-main">

                  <div class="banner-heading">

                    <div class="banner-txt-ex">
                      <img src="images/pen2.png" alt="img" />
                    </div>

                    <h1>Account</h1>

                  </div>
                  
                </div>
                
              </div>
              
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Banner Ends -->


    <!-- Account Sec Starts -->

    <section class="account-sec sec">
      <div class="container">
        <div class="row">
          <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 col-12">
            <div class="account-form-main">
              <div class="account-form-heading">
                <h2>create account</h2>
              </div>

              <div class="account-form">
                <form action="#">
                  <div class="row">
                    <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 col-12">
                      <div class="account-txt-input-main">
                        <div class="account-txt">
                          <h6>First Name</h6>
                        </div>

                        <div class="account-input">
                          <input type="text" name="user-name" id="user-name" />
                        </div>
                      </div>
                    </div>

                    <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 col-12">
                      <div class="account-txt-input-main">
                        <div class="account-txt">
                          <h6>Last Name</h6>
                        </div>

                        <div class="account-input">
                          <input type="text" name="user-name" id="userl-name" />
                        </div>
                      </div>
                    </div>

                    <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 col-12">
                      <div class="account-txt-input-main">
                        <div class="account-txt">
                          <h6>Business Name</h6>
                        </div>

                        <div class="account-input">
                          <input
                            type="text"
                            name="business-name"
                            id="business-name"
                          />
                        </div>
                      </div>
                    </div>

                    <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 col-12">
                      <div class="account-txt-input-main">
                        <div class="account-txt">
                          <h6>Email</h6>
                        </div>

                        <div class="account-input">
                          <input type="email" name="Email" id="Email" />
                        </div>
                      </div>
                    </div>

                    <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 col-12">
                      <div class="account-txt-input-main">
                        <div class="account-txt">
                          <h6>Password</h6>
                        </div>

                        <div class="password-box">
                          <div class="password-box-input">
                            <input
                              id="password1"
                              type="password"
                              class="form-control"
                              name="password"
                            />
                          </div>
                          <div class="password-icon">
                            <span
                              class="toggle-password fa fa-eye"
                              toggle="#password1"
                            ></span>
                          </div>
                        </div>
                      </div>
                    </div>

                    <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 col-12">
                      <div class="account-agre">
                        <label for="agree1">
                          <input type="checkbox" name="agree1" id="agree1" />

                          <p>
                            Lorem ipsum dolor sit amet, consectetur adipiscing
                            elit.
                          </p>
                        </label>
                      </div>
                    </div>

                    <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 col-12">
                      <div class="account-btn">
                        <a class="theme1" href="#" tabindex="0">
                          <span class="theme1-txt">register now</span>
                        </a>
                      </div>
                    </div>

                  </div>
                </form>
              </div>
            </div>
          </div>

          <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 col-12">
            <div class="account-form-main">
              <div class="account-form-heading">
                <h2>Login</h2>
              </div>

              <div class="account-form">
                <form action="#">
                  <div class="row">
                    <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 col-12">
                      <div class="account-txt-input-main">
                        <div class="account-txt">
                          <h6>User Name</h6>
                        </div>

                        <div class="account-input">
                          <input
                            type="text"
                            name="uuser-name"
                            id="uuser-name"
                          />
                        </div>
                      </div>
                    </div>

                    <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 col-12">
                      <div class="account-txt-input-main">
                        <div class="account-txt">
                          <h6>Password</h6>
                        </div>

                        <div class="password-box">
                          <div class="password-box-input">
                            <input
                              id="password2"
                              type="password"
                              class="form-control"
                              name="password"
                            />
                          </div>
                          <div class="password-icon">
                            <span
                              class="toggle-password fa fa-eye"
                              toggle="#password2"
                            ></span>
                          </div>
                        </div>
                      </div>
                    </div>

                    <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 col-12">
                      <div class="account-agre">
                        <label for="agree2">
                          <input type="checkbox" name="agree2" id="agree2" />

                          <p>Forgot Password</p>
                        </label>
                      </div>
                    </div>

                    <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 col-12">
                      <div class="account-btn">
                        <a class="theme1" href="#" tabindex="0">
                          <span class="theme1-txt">sign in</span>
                        </a>
                      </div>
                    </div>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Account Sec Ends -->

    <!-- Footer Starts -->

    <div id="Footer"></div>

    <!-- Footer Ends -->

    <script src="js/jquery-3.6.0.min.js"></script>
    <script src="js/wow.js"></script>
    <script src="slick/slick.js"></script>
    <script src="slick/slick.min.js"></script>
    <script src="js/jquery.slicknav.js"></script>
    <script src="js/fancybox.js"></script>
    <script src="js/bootstrap.js"></script>
    <script src="js/custom.js"></script>
    <script src="fontawesome5/font-awesomejs/font.js"></script>
    <script src="js/gsap-animation.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init();</script>
  </body>
</html>
